<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>力量训练 · Strength</title>
<link rel="manifest" href="manifest.json">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--card-bg:#fff;
  --text:#1c1c1e;--text2:#8e8e93;
  --pink:#FF6B8A;--blue:#007AFF;--orange:#FF9F0A;--green:#34C759;
  --purple:#AF52DE;--teal:#5AC8FA;--yellow:#FFD60A;
  --radius-lg:20px;--radius-md:14px;--radius-sm:10px;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --safe-bottom:env(safe-area-inset-bottom,20px);
  --shadow:0 2px 16px rgba(0,0,0,0.06);
}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;user-select:none;-webkit-user-select:none;
}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* ===== Tab Bar ===== */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-top:0.5px solid rgba(0,0,0,0.08);
  display:flex;justify-content:space-around;
  padding:6px 0 var(--safe-bottom);z-index:100;
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--text2);
  font-size:10px;font-weight:500;padding:4px 12px;
  transition:color 0.2s var(--ease-out);cursor:pointer;
}
.tab-btn svg{width:24px;height:24px;transition:transform 0.2s var(--spring)}
.tab-btn.active{color:var(--pink)}
.tab-btn.active svg{transform:scale(1.08)}
.tab-btn:active svg{transform:scale(0.92)}

/* ===== Page Container ===== */
.page-container{flex:1;overflow:hidden;position:relative;padding-bottom:90px}
.page{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:16px 16px 100px;
  opacity:0;transform:translateX(60px);
  transition:opacity 0.35s var(--ease-out),transform 0.45s var(--spring);
  pointer-events:none;-webkit-overflow-scrolling:touch;
}
.page.active{opacity:1;transform:translateX(0);pointer-events:auto}
.page.exit{opacity:0;transform:translateX(-60px)}

/* ===== Header ===== */
.page-header{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:20px}

/* ===== Cards ===== */
.card{
  background:var(--card-bg);border-radius:var(--radius-lg);
  padding:16px;margin-bottom:12px;
  box-shadow:var(--shadow);
  transition:transform 0.2s var(--spring),box-shadow 0.2s var(--ease-out);
  border-left:3px solid transparent;
}
.card:active{transform:scale(0.98);box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.card-header{font-size:16px;font-weight:600;margin-bottom:8px}
.card-sub{font-size:13px;color:var(--text2);line-height:1.5}

/* ===== Card accent colors per muscle ===== */
.card.chest{border-left-color:var(--pink)}
.card.shoulder{border-left-color:var(--orange)}
.card.back{border-left-color:var(--blue)}
.card.arm{border-left-color:var(--purple)}
.card.leg{border-left-color:var(--green)}
.card.core{border-left-color:var(--teal)}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 20px;border-radius:var(--radius-sm);border:none;
  font-size:15px;font-weight:590;font-family:inherit;
  cursor:pointer;transition:transform 0.2s var(--spring),opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.96)}
.btn-primary{background:var(--pink);color:#fff;width:100%}
.btn-secondary{background:rgba(0,0,0,0.05);color:var(--text)}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;background:rgba(0,0,0,0.05)}

/* ===== Muscle Group Pills ===== */
.muscle-pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.muscle-pills::-webkit-scrollbar{display:none}
.muscle-pill{
  flex-shrink:0;width:50px;height:50px;border-radius:50%;
  background:var(--card-bg);border:2px solid transparent;
  color:var(--text2);font-size:20px;font-weight:590;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s var(--spring);box-shadow:var(--shadow);
}
.muscle-pill.active{transform:scale(1.1)}
.muscle-pill.chest.active{background:#FFE5EC;border-color:var(--pink);color:var(--pink)}
.muscle-pill.shoulder.active{background:#FFF3E0;border-color:var(--orange);color:var(--orange)}
.muscle-pill.back.active{background:#E8F2FF;border-color:var(--blue);color:var(--blue)}
.muscle-pill.arm.active{background:#F3E8FF;border-color:var(--purple);color:var(--purple)}
.muscle-pill.leg.active{background:#E8F8ED;border-color:var(--green);color:var(--green)}
.muscle-pill.core.active{background:#E8FAFB;border-color:var(--teal);color:var(--teal)}

/* ===== Exercise Card ===== */
.ex-card{cursor:pointer}
.ex-card .ex-name{font-size:16px;font-weight:600}
.ex-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ex-tag{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500}
.ex-tag.level{background:rgba(0,122,255,0.1);color:var(--blue)}
.ex-tag.rpe{background:rgba(255,159,10,0.1);color:var(--orange)}
.ex-tag.gender{background:rgba(255,107,138,0.1);color:var(--pink)}

/* ===== Detail Panel ===== */
.detail-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.3);
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.detail-overlay.open{opacity:1;pointer-events:auto}
.detail-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;max-height:80vh;
  background:rgba(255,255,255,0.98);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-radius:20px 20px 0 0;padding:24px 16px var(--safe-bottom);
  z-index:201;overflow-y:auto;
  transition:transform 0.5s var(--spring);
}
.detail-panel.open{transform:translateX(-50%) translateY(0)}
.detail-handle{width:36px;height:5px;background:rgba(0,0,0,0.15);border-radius:3px;margin:0 auto 16px}
.detail-title{font-size:20px;font-weight:700;margin-bottom:12px}
.detail-section{margin-bottom:16px}
.detail-section h4{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.detail-tip{display:flex;gap:8px;padding:8px 0;font-size:14px;line-height:1.5}
.detail-tip .dot{color:var(--pink);flex-shrink:0}
.video-link{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  background:rgba(255,107,138,0.08);border-radius:var(--radius-sm);
  color:var(--pink);font-size:14px;font-weight:500;text-decoration:none;
  transition:all 0.2s var(--spring);
}
.video-link:active{transform:scale(0.96);background:rgba(255,107,138,0.15)}

/* ===== State Assessment ===== */
.assess-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.assess-overlay.open{opacity:1;pointer-events:auto}
.assess-card{
  background:#fff;border-radius:var(--radius-lg);
  padding:24px;width:calc(100% - 48px);max-width:380px;
  box-shadow:0 8px 32px rgba(0,0,0,0.12);
  transform:scale(0.9) translateY(20px);
  transition:transform 0.5s var(--spring);
}
.assess-overlay.open .assess-card{transform:scale(1) translateY(0)}
.assess-card h3{font-size:20px;margin-bottom:6px}
.assess-card p{font-size:14px;color:var(--text2);margin-bottom:20px}
.assess-option{
  width:100%;padding:14px 16px;border-radius:var(--radius-sm);
  background:rgba(0,0,0,0.03);border:1.5px solid transparent;
  color:var(--text);font-size:16px;font-family:inherit;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;margin-bottom:8px;
  transition:all 0.2s var(--spring);
}
.assess-option:active{transform:scale(0.97);border-color:var(--pink);background:rgba(255,107,138,0.05)}
.assess-option .emoji{font-size:24px}

/* ===== Workout Set ===== */
.set-group{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.set-group label{font-size:13px;color:var(--text2);width:40px}
.set-input{
  width:70px;padding:8px 10px;border-radius:8px;
  background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.1);
  color:var(--text);font-size:15px;font-family:inherit;text-align:center;
}
.set-input:focus{outline:none;border-color:var(--pink)}
.set-done-btn{
  width:32px;height:32px;border-radius:50%;border:2px solid rgba(0,0,0,0.15);
  background:none;color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s var(--spring);
}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#fff}

/* ===== Rest Timer ===== */
.rest-timer{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  width:120px;height:120px;border-radius:50%;
  background:#fff;box-shadow:0 8px 40px rgba(0,0,0,0.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:250;pointer-events:none;
  transition:transform 0.4s var(--spring);
}
.rest-timer.show{transform:translate(-50%,-50%) scale(1)}
.rest-timer .seconds{font-size:42px;font-weight:700;color:var(--pink)}
.rest-timer .label{font-size:12px;color:var(--text2)}

/* ===== Toast ===== */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);
  background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.1);
  color:var(--text);padding:10px 20px;border-radius:20px;
  font-size:14px;font-weight:500;z-index:300;
  transition:transform 0.5s var(--spring);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== Calendar Heatmap ===== */
.cal-grid{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.cal-cell{width:13px;height:13px;border-radius:3px;background:rgba(0,0,0,0.04)}
.cal-cell.trained{background:var(--pink);opacity:0.5}
.cal-cell.trained-2{background:var(--pink);opacity:0.75}
.cal-cell.trained-3{background:var(--pink);opacity:1}

/* ===== Form Inputs ===== */
.form-input{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);
  background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.1);
  color:var(--text);font-size:15px;font-family:inherit;
  margin-bottom:10px;transition:border-color 0.2s;
}
.form-input:focus{outline:none;border-color:var(--pink)}
.form-label{font-size:13px;color:var(--text2);margin-bottom:4px;display:block}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}

/* ===== PR Badge ===== */
.pr-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 8px;border-radius:6px;
  background:rgba(255,159,10,0.1);color:var(--orange);
  font-size:11px;font-weight:600;
}

/* ===== RPE Adjustment Chips ===== */
.adjust-chips{display:flex;gap:6px;margin-top:8px}
.adjust-chip{
  padding:5px 12px;border-radius:14px;border:1px solid rgba(0,0,0,0.1);
  background:none;color:var(--text2);font-size:12px;cursor:pointer;
  transition:all 0.2s var(--spring);
}
.adjust-chip.chosen{background:var(--pink);border-color:var(--pink);color:#fff}
.adjust-chip:active{transform:scale(0.95)}

/* ===== Motivation Quote ===== */
.quote-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.quote-overlay.open{opacity:1;pointer-events:auto}
.quote-card{
  background:#fff;border-radius:var(--radius-lg);
  padding:32px 24px;width:calc(100% - 48px);max-width:360px;
  box-shadow:0 8px 32px rgba(0,0,0,0.12);text-align:center;
  transform:scale(0.8);transition:transform 0.6s var(--spring);
}
.quote-overlay.open .quote-card{transform:scale(1)}
.quote-card .q-emoji{font-size:48px;margin-bottom:12px}
.quote-card .q-text{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:16px}
.quote-card .q-close{
  padding:10px 32px;border-radius:20px;border:none;
  background:var(--pink);color:#fff;font-size:15px;font-weight:590;
  cursor:pointer;transition:transform 0.2s var(--spring);
}
.quote-card .q-close:active{transform:scale(0.95)}

/* ===== Animations ===== */
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.check-pop{animation:checkPop 0.4s var(--spring)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in-up{animation:fadeInUp 0.5s var(--spring)}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.08)}70%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}
.bounce-in{animation:bounceIn 0.6s var(--spring)}

/* ===== Scrollbar ===== */
.page::-webkit-scrollbar{width:0}

/* ===== Empty State ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ===== Gender Toggle ===== */
.gender-toggle{display:flex;gap:8px}
.gender-btn{
  flex:1;padding:12px;border-radius:var(--radius-sm);
  border:2px solid rgba(0,0,0,0.08);background:#fff;
  font-size:16px;font-family:inherit;cursor:pointer;
  transition:all 0.2s var(--spring);text-align:center;
}
.gender-btn.active-male{background:#E8F2FF;border-color:var(--blue);color:var(--blue)}
.gender-btn.active-female{background:#FFE5EC;border-color:var(--pink);color:var(--pink)}
.gender-btn:active{transform:scale(0.96)}

/* ===== Warmup Card ===== */
.warmup-card{
  background:linear-gradient(135deg,rgba(255,107,138,0.06),rgba(255,159,10,0.06));
  border-left:3px solid var(--pink);padding:14px 16px;border-radius:var(--radius-md);
  margin-bottom:12px;font-size:13px;line-height:1.8;
}

/* ===== Workout list ===== */
.workout-day{margin-bottom:16px}
.workout-day h4{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--pink)}
</style>
</head>

function getExercise(name){return EXERCISES.find(e=>e.name===name)}
function getGender(){return state.profile.gender||'male'}
function getStandards(){return getGender()==='female'?FEMALE_STANDARDS:MALE_STANDARDS}

function getLevelFromStrength(){
  const bw = parseFloat(state.profile.weight)||0;
  if(!bw||bw<=0) return null;
  const std = getStandards();
  let bestLvl = 0; // 0=unknown,1=beginner,2=intermediate,3=advanced

  function check(val, ratio, beginnerThresh, intermediateThresh){
    if(val<=0||isNaN(val)) return 0;
    const r = val/bw;
    if(r>=intermediateThresh) return 3;
    if(r>=beginnerThresh) return 2;
    return 1;
  }

  // Bench: 1RM ≈ working weight × 1.2
  const bench1rm = (parseFloat(state.profile.bench)||0)*1.2;
  const benchLvl = check(bench1rm,0,std.bench.beginner,std.bench.intermediate);
  bestLvl = Math.max(bestLvl,benchLvl);

  const squat1rm = (parseFloat(state.profile.squat)||0)*1.2;
  const squatLvl = check(squat1rm,0,std.squat.beginner,std.squat.intermediate);
  bestLvl = Math.max(bestLvl,squatLvl);

  const dl1rm = (parseFloat(state.profile.deadlift)||0)*1.2;
  const dlLvl = check(dl1rm,0,std.deadlift.beginner,std.deadlift.intermediate);
  bestLvl = Math.max(bestLvl,dlLvl);

  // Pull-ups: max reps
  const pu = parseInt(state.profile.pullup)||0;
  if(pu>=std.pullup.intermediate) bestLvl = Math.max(bestLvl,3);
  else if(pu>=std.pullup.beginner) bestLvl = Math.max(bestLvl,2);
  else if(pu>0) bestLvl = Math.max(bestLvl,1);

  if(bestLvl>=3) return 'advanced';
  if(bestLvl>=2) return 'intermediate';
  if(bestLvl>=1) return 'beginner';
  return null;
}

function getLevel(){
  const strengthLevel = getLevelFromStrength();
  if(strengthLevel) return strengthLevel;

  const years = parseFloat(state.profile.years)||0;
  if(years<=0) return null;
  if(years<1) return 'beginner';
  if(years<=3) return 'intermediate';
  return 'advanced';
}

function getLevelLabel(lv){
  if(lv==='beginner') return '新手';
  if(lv==='intermediate') return '中级';
  if(lv==='advanced') return '高级';
  return '';
}

function getPlanDay(){
  const gender = getGender();
  const lv = getLevel()||'beginner';
  const plan = PLANS[gender][lv];
  if(!plan) return 0;
  const history = Object.entries(state.history).sort((a,b)=>b[0].localeCompare(a[0]));
  if(history.length===0) return 0;
  const lastDay = parseInt(history[0][1].planDay)||0;
  return (lastDay + 1) % plan.split.length;
}

function startWorkoutPreCheck(dayIndex){
  const overlay = $('#assess-overlay');
  const card = $('#assess-card');
  card.innerHTML = `
    <h3>今天感觉怎么样？</h3>
    <p style="color:var(--text2);font-size:14px">根据状态自动调整训练强度</p>
    <button class="assess-option" onclick="startWorkout(${dayIndex},'good')"><span class="emoji">🔥</span>很有劲！全力以赴</button>
    <button class="assess-option" onclick="startWorkout(${dayIndex},'ok')"><span class="emoji">🙂</span>还行，正常训练</button>
    <button class="assess-option" onclick="startWorkout(${dayIndex},'tired')"><span class="emoji">😮‍💨</span>有点累，轻松一点</button>
  `;
  overlay.classList.add('open');
}

function startWorkout(dayIndex, feeling){
  $('#assess-overlay').classList.remove('open');
  const gender = getGender();
  const lv = getLevel()||'beginner';
  const plan = PLANS[gender][lv];
  const planDay = plan.split[dayIndex];
  const suggestion = estimateWeight(planDay.exercises[0]);
  const hasEstimate = suggestion.weight!=='' && suggestion.weight>0;

  const exercises = planDay.exercises.map((name,ei)=>{
    const exData = getExercise(name);
    let numSets = 4;
    if(exData && exData.sets){
      const m = exData.sets.match(/(\d+)组/);
      if(m) numSets = parseInt(m[1]);
    }
    if(feeling==='tired') numSets = Math.max(2, numSets - 1);
    const est = estimateWeight(name);
    const sets = [];

    // Add warmup sets for first exercise if it's a compound
    if(ei===0 && needsWarmup(name) && est.weight>0){
      const wu = buildWarmupSets(name, est.weight);
      wu.forEach(ws => sets.push({...ws, done:false}));
    }

    for(let i=0;i<numSets;i++) sets.push({
      reps:est.reps||'', weight:est.weight||'', done:false
    });
    return {name, sets, rpeAdjust:null, suggestedWeight:est.weight||'', suggestedReps:est.reps||''};
  });

  todayWorkout = {dayIndex, exercises, feeling, firstSetFeedback: hasEstimate ? null : 'skip'};
  renderWorkout();
  if(hasEstimate){
    showToast('已根据你的力量数据推荐重量 💡');
  }else{
    showToast('训练开始！填写力量数据可获得智能推荐 💡');
  }
}

function updateSet(exI, setI, field, value){todayWorkout.exercises[exI].sets[setI][field] = value}
function toggleSetDone(exI, setI){
  const s = todayWorkout.exercises[exI].sets[setI];
  s.done = !s.done;
  const btn = $(`#done-btn-${exI}-${setI}`);
  if(btn){
    btn.classList.toggle('done', s.done);
    if(s.done){
      btn.classList.add('check-pop');
      startRestTimer(exI);
    }
  }
  const ex = todayWorkout.exercises[exI];
  const workingDone = ex.sets.filter(s=>!s.warmup).every(s=>s.done);
  const card = $(`#ex-card-${exI}`);
  if(card) card.style.opacity = workingDone ? '0.5' : '';
  const allWorkoutDone = todayWorkout.exercises.every(ex=>ex.sets.filter(s=>!s.warmup).every(s=>s.done));
  if(allWorkoutDone) showToast('全部动作完成！去做拉伸吧 🧘');

  // First-set feedback: after completing the first WORKING set of the first exercise
  const isFirstWorkingSet = exI===0 && !s.warmup && todayWorkout.exercises[0].sets.filter((ss,i)=>i<setI&&ss.warmup).length===setI;
  if(exI===0 && !s.warmup && s.done && todayWorkout.firstSetFeedback===null){
    todayWorkout.firstSetFeedback = 'pending';
    renderWorkout();
    setTimeout(()=>{
      const fb = $('#first-set-fb');
      if(fb) fb.scrollIntoView({behavior:'smooth',block:'center'});
    },200);
  }
}

function startRestTimer(exI){
  const name = todayWorkout.exercises[exI].name;
  let sec = getRestTime(name);
  const timer = $('#rest-timer');
  const secEl = $('#rest-sec');
  secEl.textContent = sec;
  timer.classList.add('show');
  clearInterval(restTimerId);
  restTimerId = setInterval(()=>{
    sec--;
    secEl.textContent = sec;
    if(sec<=0){
      clearInterval(restTimerId);
      timer.classList.remove('show');
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  },1000);
  setTimeout(()=>{if(timer.classList.contains('show')){clearInterval(restTimerId);timer.classList.remove('show');}},sec*1000+5000);
}

function adjustRPE(exI, level){todayWorkout.exercises[exI].rpeAdjust = level; renderWorkout()}

function adjustAllWeights(adjustment){
  if(adjustment==='perfect'){todayWorkout.firstSetFeedback='done';renderWorkout();return;}
  const factor = adjustment==='heavier' ? 1.10 : 0.90;
  todayWorkout.exercises.forEach((ex,ei)=>{
    if(ei===0 && adjustment==='heavier'){
      ex.sets.forEach((s,si)=>{if(si>0&&!s.warmup&&s.weight>0){s.weight=Math.round(s.weight*factor/2.5)*2.5;if(s.weight<=0)s.weight=2.5;}});
    }else if(ei>0||adjustment==='lighter'){
      ex.sets.forEach(s=>{if(!s.warmup&&s.weight>0){s.weight=Math.round(s.weight*factor/2.5)*2.5;if(s.weight<=0)s.weight=2.5;}});
    }
  });
  todayWorkout.firstSetFeedback = 'done';
  renderWorkout();
  const msg = adjustment==='heavier'?'已全部上调 ~10% ⬆':'已全部下调 ~10% ⬇';
  showToast(msg);
}

function finishWorkout(){
  if(!todayWorkout) return;
  const today = todayStr();
  state.history[today] = {
    exercises: todayWorkout.exercises.map(ex=>({
      name:ex.name,
      sets:ex.sets.filter(s=>s.done).map(s=>({reps:parseInt(s.reps)||0,weight:parseFloat(s.weight)||0}))
    })).filter(ex=>ex.sets.length>0),
    feeling: todayWorkout.feeling,
    planDay: todayWorkout.dayIndex,
    note: '',
  };
  todayWorkout.exercises.forEach(ex=>{
    ex.sets.filter(s=>s.done).forEach(s=>{
      const w = parseFloat(s.weight)||0;
      const r = parseInt(s.reps)||0;
      const currentPR = state.pr[ex.name];
      if(!currentPR || w>currentPR.weight || (w===currentPR.weight && r>currentPR.reps)){
        state.pr[ex.name] = {weight:w, reps:r, date:today};
      }
    });
  });
  saveState();
  todayWorkout = null;
  renderWorkout();
  showMotivation();
}

  if(!name){showToast('请选择动作');return;}
  const weights=$$('#ql-sets .ql-weight'),reps=$$('#ql-sets .ql-reps'),sets=[];
  for(let i=0;i<weights.length;i++){const w=parseFloat(weights[i].value),r=parseInt(reps[i].value);if(w>0&&r>0)sets.push({weight:w,reps:r,done:true});}
  if(sets.length===0){showToast('请至少填写一组');return;}
  const today=todayStr();
  if(!state.history[today])state.history[today]={exercises:[],feeling:'ok',planDay:''};
  state.history[today].exercises.push({name,sets});
  sets.forEach(s=>{const cp=state.pr[name];if(!cp||s.weight>cp.weight||(s.weight===cp.weight&&s.reps>cp.reps))state.pr[name]={weight:s.weight,reps:s.reps,date:today};});
  saveState();renderLog();showToast('记录已保存 ✅');
}

// ===========================
// RENDER: Tab 3 — 历史
// ===========================
function renderHistory(){
  const container = $('#history-content');
  const entries = Object.entries(state.history).sort((a,b)=>b[0].localeCompare(a[0]));
  if(entries.length===0){
    container.innerHTML = `<div class="empty-state fade-in-up"><div class="icon">📅</div><p>还没有训练记录</p><p style="font-size:13px;color:var(--text2)">完成训练后这里会出现历史记录</p></div>`;
    return;
  }
  const now = new Date();
  const year=now.getFullYear(),month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,0).getDay();
  let calHTML='<div class="card"><div class="card-header">本月训练热力图</div><div class="cal-grid">';
  for(let i=0;i<firstDow;i++)calHTML+='<div class="cal-cell" style="background:transparent"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry=state.history[ds];
    let cls='cal-cell';
    if(entry){const count=entry.exercises.length;if(count>=6)cls+=' trained-3';else if(count>=4)cls+=' trained-2';else cls+=' trained';}
    calHTML+=`<div class="${cls}" title="${ds}"></div>`;
  }
  calHTML+='</div></div>';
  let listHTML='<div style="margin-top:12px">';
  entries.forEach(([date,entry])=>{
    listHTML+=`<div class="card workout-day"><h4>${date} · ${feelingLabel(entry.feeling)}</h4>${entry.exercises.map(ex=>`<div style="font-size:13px;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,0.03)"><span style="font-weight:500">${ex.name}</span><span style="color:var(--text2);margin-left:8px">${ex.sets.map(s=>`${s.weight}kg×${s.reps}`).join(' | ')}</span></div>`).join('')}${entry.note?`<div style="font-size:11px;color:var(--blue);margin-top:4px;font-style:italic">📝 ${entry.note}</div>`:''}</div>`;
  });
  listHTML+='</div>';
  const prEntries=Object.entries(state.pr).sort((a,b)=>a[0].localeCompare(b[0]));
  if(prEntries.length>0){
    listHTML+=`<div class="card" style="margin-top:12px"><div class="card-header">🏆 个人最佳记录</div>${prEntries.map(([name,pr])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,0.03)"><span>${name}</span><span class="pr-badge">${pr.weight}kg × ${pr.reps}次</span><span style="color:var(--text2);font-size:11px">${pr.date}</span></div>`).join('')}</div>`;
  }
  container.innerHTML = calHTML + listHTML;
}

// ===========================
// RENDER: Tab 4 — 我的
// ===========================
function renderProfile(){
  const container = $('#profile-content');
  const p = state.profile;
  const lv = getLevel();
  const gender = getGender();
  const plan = lv ? PLANS[gender][lv] : null;
  const today = new Date();
  let weekCount=0,weekVolume=0;
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const entry=state.history[ds];
    if(entry){weekCount++;entry.exercises.forEach(ex=>{ex.sets.forEach(s=>{weekVolume+=(s.weight||0)*(s.reps||0)});});}
  }

  const strengthLevel = getLevelFromStrength();
  const yearsLevel = (parseFloat(p.years)||0)<=0 ? null : (parseFloat(p.years)<1?'beginner':(parseFloat(p.years)<=3?'intermediate':'advanced'));

  container.innerHTML = `
    <div class="fade-in-up">
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px">${p.name?'🏋️':'👤'}</div>
          <div><div style="font-size:18px;font-weight:700">${p.name||'未设置名称'}</div><div style="font-size:13px;color:var(--text2)">${getGender()==='female'?'👩 女生':'👨 男生'} · ${lv?getLevelLabel(lv):'未评级'}${plan?' · '+plan.name:''}</div></div>
        </div>
      </div>
      <div class="card"><div class="card-header">本周统计</div><div style="display:flex;gap:16px;margin-top:8px"><div style="flex:1;text-align:center;padding:12px;background:rgba(0,0,0,0.02);border-radius:12px"><div style="font-size:24px;font-weight:700">${weekCount}</div><div style="font-size:11px;color:var(--text2)">训练天数</div></div><div style="flex:1;text-align:center;padding:12px;background:rgba(0,0,0,0.02);border-radius:12px"><div style="font-size:24px;font-weight:700">${Math.round(weekVolume/100)/10}t</div><div style="font-size:11px;color:var(--text2)">总训练量</div></div></div></div>
      <div class="card"><div class="card-header">身体数据</div>
        <label class="form-label">性别</label>
        <div class="gender-toggle" style="margin-bottom:10px">
          <button class="gender-btn ${gender==='male'?'active-male':''}" id="g-btn-male" onclick="setGender('male')">👨 男生</button>
          <button class="gender-btn ${gender==='female'?'active-female':''}" id="g-btn-female" onclick="setGender('female')">👩 女生</button>
        </div>
        <label class="form-label">昵称</label><input class="form-input" id="pf-name" value="${p.name||''}" placeholder="你的名字">
        <div class="form-row"><div><label class="form-label">身高 (cm)</label><input class="form-input" id="pf-height" type="number" value="${p.height||''}" placeholder="175"></div><div><label class="form-label">体重 (kg)</label><input class="form-input" id="pf-weight" type="number" value="${p.weight||''}" placeholder="70"></div></div>
        <label class="form-label">训练年限</label><select class="form-input" id="pf-years"><option value="">请选择</option><option value="0.5" ${p.years==='0.5'?'selected':''}>不到1年</option><option value="1" ${p.years==='1'?'selected':''}>1年</option><option value="2" ${p.years==='2'?'selected':''}>2年</option><option value="3" ${p.years==='3'?'selected':''}>3年</option><option value="4" ${p.years==='4'?'selected':''}>4年</option><option value="5" ${p.years==='5'?'selected':''}>5年以上</option></select>
      </div>
      <div class="card"><div class="card-header">力量数据（选填，用于精准定级）</div><div class="card-sub" style="margin-bottom:8px">填写你做组的重量（非1RM），系统自动换算</div>
        <div class="form-row"><div><label class="form-label">卧推做组 (kg)</label><input class="form-input" id="pf-bench" type="number" value="${p.bench||''}" placeholder="如 60"></div><div><label class="form-label">深蹲做组 (kg)</label><input class="form-input" id="pf-squat" type="number" value="${p.squat||''}" placeholder="如 80"></div></div>
        <div class="form-row"><div><label class="form-label">硬拉做组 (kg)</label><input class="form-input" id="pf-deadlift" type="number" value="${p.deadlift||''}" placeholder="如 100"></div><div><label class="form-label">引体向上 (最大次数)</label><input class="form-input" id="pf-pullup" type="number" value="${p.pullup||''}" placeholder="如 5"></div></div>
        ${strengthLevel?`<div style="padding:10px;border-radius:10px;background:rgba(255,107,138,0.08);margin-top:4px;font-size:13px">力量评估: <strong>${getLevelLabel(strengthLevel)}</strong>${yearsLevel&&yearsLevel!==strengthLevel?` · 年限评估: ${getLevelLabel(yearsLevel)}（综合采用力量评估）`:''}</div>`:''}
      </div>
      ${lv?`<div style="padding:10px;border-radius:10px;background:rgba(52,199,89,0.08);margin-bottom:10px;font-size:13px">当前等级: <strong>${getLevelLabel(lv)}</strong> · 推荐计划: <strong>${plan.name}</strong>（${plan.frequency}）</div>`:''}
      <button class="btn btn-primary" onclick="saveProfile()">保存资料</button>
      <div class="card" style="margin-top:8px"><button class="btn btn-sm" style="width:100%;color:var(--pink);background:rgba(255,107,138,0.06)" onclick="resetData()">重置所有数据</button></div>
    </div>`;
}

function setGender(g){
  state.profile.gender = g;
  saveState();
  renderProfile();
}

function saveProfile(){
  state.profile.name = $('#pf-name').value;
  state.profile.height = $('#pf-height').value;
  state.profile.weight = $('#pf-weight').value;
  state.profile.years = $('#pf-years').value;
  state.profile.bench = $('#pf-bench').value;
  state.profile.squat = $('#pf-squat').value;
  state.profile.deadlift = $('#pf-deadlift').value;
  state.profile.pullup = $('#pf-pullup').value;
  saveState();
  showToast('资料已保存 ✅');
  renderProfile();
}

function resetData(){
  if(confirm('确定要清除所有数据吗？此操作无法撤销。')){
    state = defaultState(); saveState(); todayWorkout = null;
    showToast('数据已清除'); renderAll();
  }
}

// ===========================
// TOAST
// ===========================
function showToast(msg){
  const toast = $('#toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toast.classList.remove('show'), 2000);
}

// ===========================
// TAB SWITCHING
// ===========================
function switchTab(idx){
  if(idx===currentTab) return;
  const oldPage = $(`#page-${currentTab}`);
  const newPage = $(`#page-${idx}`);
  if(oldPage){oldPage.classList.remove('active');oldPage.classList.add('exit');setTimeout(()=>oldPage.classList.remove('exit'),500);}
  newPage.classList.add('active');
  $$('.tab-btn').forEach((b,i)=>b.classList.toggle('active', i===idx));
  currentTab = idx;
  renderCurrentPage();
}
function renderCurrentPage(){
  switch(currentTab){
    case 0: renderWorkout(); break;
    case 1: renderMusclePills(); renderExerciseList(); break;
    case 2: renderLog(); break;
    case 3: renderHistory(); break;
    case 4: renderProfile(); break;
  }
}
function renderAll(){
  renderWorkout(); renderMusclePills(); renderExerciseList();
  renderLog(); renderHistory(); renderProfile();
}

$$('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>switchTab(parseInt(btn.dataset.tab)));});
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX});
document.addEventListener('touchend',e=>{const diff=e.changedTouches[0].clientX-touchStartX;if(Math.abs(diff)>60){if(diff<0&&currentTab<4)switchTab(currentTab+1);else if(diff>0&&currentTab>0)switchTab(currentTab-1);}});

renderAll();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
